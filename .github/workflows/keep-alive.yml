name: Keep Alive
on:
  schedule:
    - cron: '*/25 * * * *'
  workflow_dispatch:
jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Wake Streamlit app
        run: |
          # Streamlit Cloud needs cookie-jar redirect to complete auth
          curl -sL -b /tmp/c -c /tmp/c -o /dev/null -w "HTTP %{http_code}\n" \
            --max-time 30 \
            "https://bayesiq-dashboard-golden-flows-fintech.streamlit.app"
